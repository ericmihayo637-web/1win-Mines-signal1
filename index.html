<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1WIN MINES SIGNAL</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-bg: #050505;
            --grid-bg: #111;
            --glow: 0 0 15px rgba(0, 242, 255, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }

        body {
            background-color: var(--dark-bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            opacity: 0.15;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--glow);
            text-align: center;
            position: relative;
        }

        .header {
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            padding-bottom: 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .status-online { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
        .status-offline { color: #ff0000; display: none; }

        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: var(--glow);
            margin: 10px 0;
        }

        .signal-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            text-align: left;
            background: rgba(0, 242, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
        }

        .signal-info span { color: var(--neon-blue); font-weight: bold; }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin: 20px 0;
            perspective: 1000px;
        }

        .tile {
            aspect-ratio: 1/1;
            background: var(--grid-bg);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.4s ease;
            font-size: 1.2rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.5);
        }

        .tile.safe {
            background: rgba(0, 242, 255, 0.2);
            border-color: var(--neon-blue);
            box-shadow: inset 0 0 10px var(--neon-blue), var(--glow);
            animation: pulse 1.5s infinite;
            color: white;
        }

        .tile.safe .star {
            color: var(--neon-blue);
            filter: drop-shadow(0 0 8px var(--neon-blue));
            font-size: 1.5rem;
            line-height: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border-radius: 5px;
            margin-top: 10px;
        }

        .btn-generate:hover:not(:disabled) {
            background: var(--neon-blue);
            color: black;
            box-shadow: var(--glow);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .promo-box {
            margin-top: 20px;
            padding: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
        }

        .promo-code { color: var(--neon-blue); font-weight: bold; font-size: 1rem; }

        .link-reg {
            display: block;
            margin-top: 10px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .link-reg:hover { opacity: 1; text-decoration: underline; }

        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 15px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid transparent;
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        #offline-msg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--neon-blue);
        }

        .signal-countdown {
            font-size: 0.7rem;
            color: var(--neon-blue);
            margin-top: 5px;
        }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="offline-msg">
    <h2>CONNECTION REQUIRED</h2>
    <p>Please connect to the internet to access live signal.</p>
</div>

<div class="container">
    <div id="overlay">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--neon-blue); font-size: 0.7rem; letter-spacing: 2px;">GENERATING SIGNAL...</p>
    </div>

    <div class="header">
        <div class="status-bar">
            <div id="net-status" class="status-online">● SYSTEM READY</div>
            <div>LIVE SIGNAL</div>
        </div>
        <div class="title">1WIN MINES SIGNAL</div>
        <div style="font-size: 0.6rem; color: #888;">SIGNAL SYSTEM v2.0</div>
    </div>

    <div class="signal-info">
        <div>SAFE TILES: <span id="safe-count">-</span></div>
        <div>TRAP TILES: <span id="trap-count">-</span></div>
        <div>SIGNAL TIME: <span id="play-time">--:--</span></div>
        <div>CONFIDENCE: <span id="accuracy">--%</span></div>
        <div style="grid-column: span 2;">STATUS: <span id="signal-status">NO SIGNAL</span></div>
    </div>

    <div class="grid" id="mines-grid">
        <!-- 25 Tiles generated by JS -->
    </div>

    <button class="btn-generate" onclick="getSignal()" id="gen-btn">GET SIGNAL</button>
    <div id="countdown-display" class="signal-countdown"></div>

    <div class="promo-box">
        CODE: <span class="promo-code">GAME2710</span><br>
        <a href="#" class="link-reg">1WIN REGISTRATION</a>
    </div>
</div>

<script>
    const grid = document.getElementById('mines-grid');
    const overlay = document.getElementById('overlay');
    const btn = document.getElementById('gen-btn');
    const countdownDisplay = document.getElementById('countdown-display');

    let currentSignal = {
        playTime: null,
        safeTiles: [],
        safeCount: null,
        trapCount: null,
        confidence: null
    };

    let countdownInterval = null;

    function initGrid() {
        grid.innerHTML = '';
        for (let i = 0; i < 25; i++) {
            const tile = document.createElement('div');
            tile.classList.add('tile');
            tile.dataset.index = i;
            
            const star = document.createElement('span');
            star.className = 'star';
            star.innerHTML = '⭐';
            star.style.display = 'none';
            
            tile.appendChild(star);
            grid.appendChild(tile);
        }
    }

    function checkConnection() {
        const offlineMsg = document.getElementById('offline-msg');
        if (!navigator.onLine) {
            offlineMsg.style.display = 'flex';
        } else {
            offlineMsg.style.display = 'none';
        }
    }
    window.addEventListener('online', checkConnection);
    window.addEventListener('offline', checkConnection);

    function getNextPlayTime(now) {
        const minutes = now.getMinutes();
        const hour = now.getHours();
        const year = now.getFullYear();
        const month = now.getMonth();
        const date = now.getDate();

        const signalMinutes = [5, 20, 35, 50];
        
        for (let signalMin of signalMinutes) {
            if (signalMin > minutes) {
                return new Date(year, month, date, hour, signalMin, 0, 0);
            }
        }
        
        return new Date(year, month, date, hour + 1, 5, 0, 0);
    }

    function generateSafeTiles(count, timestamp) {
        const tiles = [];
        const date = new Date(timestamp);
        const hour = date.getHours();
        const minute = date.getMinutes();
        const day = date.getDate();
        const month = date.getMonth() + 1;
        const year = date.getFullYear();
        
        const seed = (hour * 1000000 + minute * 10000 + day * 100 + month) * (timestamp % 100000);
        
        let randomVal = seed;
        
        while (tiles.length < count) {
            randomVal = (randomVal * 1664525 + 1013904223) % 4294967296;
            const randomIndex = Math.floor((randomVal / 4294967296) * 25);
            
            if (!tiles.includes(randomIndex)) {
                tiles.push(randomIndex);
            }
        }
        
        return tiles.sort((a, b) => a - b);
    }

    function generateTrapCount(timestamp) {
        const date = new Date(timestamp);
        const hour = date.getHours();
        const minute = date.getMinutes();
        const day = date.getDate();
        
        const seed = (hour * 1000 + minute * 10 + day) % 7;
        const trapOptions = [3, 4, 5, 6, 7];
        const index = seed % trapOptions.length;
        
        return trapOptions[index];
    }

    function generateConfidence(timestamp) {
        const date = new Date(timestamp);
        const minute = date.getMinutes();
        const second = date.getSeconds();
        const millisecond = date.getMilliseconds();
        
        const confidenceMap = {
            5: 98.5,
            20: 96.2,
            35: 97.8,
            50: 95.4
        };
        
        const baseConfidence = confidenceMap[minute] || 96.0;
        const variation = ((second * 100 + millisecond) % 30) / 100;
        
        return (baseConfidence + variation).toFixed(2);
    }

    function generateSignalData(timestamp) {
        const date = new Date(timestamp);
        const minute = date.getMinutes();
        
        const safeCountMap = {
            5: 4,
            20: 5,
            35: 3,
            50: 6
        };
        
        const safeCount = safeCountMap[minute] || 4;
        const safeTiles = generateSafeTiles(safeCount, timestamp);
        const trapCount = generateTrapCount(timestamp);
        const confidence = generateConfidence(timestamp);
        
        return { 
            safeCount, 
            trapCount, 
            confidence,
            safeTiles 
        };
    }

    function updateCountdown() {
        if (!currentSignal.playTime) {
            countdownDisplay.innerText = '';
            return;
        }

        const now = new Date();
        const playTime = currentSignal.playTime;

        if (now >= playTime) {
            btn.disabled = false;
            countdownDisplay.innerText = 'PLAY NOW - CLICK GET SIGNAL FOR NEXT';
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            updateUI();
        } else {
            const diffMs = playTime - now;
            const diffMin = Math.floor(diffMs / 60000);
            const diffSec = Math.floor((diffMs % 60000) / 1000);
            
            countdownDisplay.innerText = `PLAY AT: ${String(playTime.getHours()).padStart(2, '0')}:${String(playTime.getMinutes()).padStart(2, '0')} (${diffMin}m ${diffSec}s)`;
            btn.disabled = true;
        }
    }

    function updateUI() {
        if (!currentSignal.playTime) {
            document.getElementById('safe-count').innerText = '-';
            document.getElementById('trap-count').innerText = '-';
            document.getElementById('play-time').innerText = '--:--';
            document.getElementById('accuracy').innerText = '--%';
            document.getElementById('signal-status').innerText = 'NO SIGNAL';

            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(t => { 
                t.classList.remove('safe');
                const star = t.querySelector('.star');
                if (star) star.style.display = 'none';
            });
            
            btn.disabled = false;
            return;
        }

        const now = new Date();
        const playTime = currentSignal.playTime;
        const hours = String(playTime.getHours()).padStart(2, '0');
        const mins = String(playTime.getMinutes()).padStart(2, '0');
        const timeStr = `${hours}:${mins}`;

        document.getElementById('safe-count').innerText = currentSignal.safeCount;
        document.getElementById('trap-count').innerText = currentSignal.trapCount;
        document.getElementById('play-time').innerText = timeStr;
        document.getElementById('accuracy').innerText = currentSignal.confidence + '%';

        if (now < playTime) {
            document.getElementById('signal-status').innerHTML = `PLAY AT ${timeStr}`;
        } else {
            document.getElementById('signal-status').innerText = 'PLAY NOW';
        }

        const tiles = document.querySelectorAll('.tile');
        tiles.forEach(t => { 
            t.classList.remove('safe');
            const star = t.querySelector('.star');
            if (star) star.style.display = 'none';
        });

        currentSignal.safeTiles.forEach(idx => {
            if (idx >= 0 && idx < 25) {
                tiles[idx].classList.add('safe');
                const star = tiles[idx].querySelector('.star');
                if (star) star.style.display = 'inline';
            }
        });
    }

    function getSignal() {
        overlay.style.display = 'flex';
        
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }

        setTimeout(() => {
            const now = new Date();

            if (currentSignal.playTime && now < currentSignal.playTime) {
                overlay.style.display = 'none';
                countdownInterval = setInterval(updateCountdown, 1000);
                updateCountdown();
                return;
            }

            const nextTime = getNextPlayTime(now);
            const timestamp = nextTime.getTime();
            const newData = generateSignalData(timestamp);

            currentSignal.playTime = nextTime;
            currentSignal.safeCount = newData.safeCount;
            currentSignal.trapCount = newData.trapCount;
            currentSignal.confidence = newData.confidence;
            currentSignal.safeTiles = newData.safeTiles;

            updateUI();
            overlay.style.display = 'none';
            
            countdownInterval = setInterval(updateCountdown, 1000);
            updateCountdown();
        }, 1500);
    }

    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "0101010101010101";
    const fontSize = 10;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00f2ff";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = letters.charAt(Math.floor(Math.random() * letters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 50);

    initGrid();
    checkConnection();
    updateUI();
    
    setInterval(() => {
        if (currentSignal.playTime) {
            const now = new Date();
            if (now >= currentSignal.playTime) {
                btn.disabled = false;
                if (countdownInterval) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                }
                countdownDisplay.innerText = 'PLAY NOW - CLICK GET SIGNAL FOR NEXT';
                updateUI();
            }
        }
    }, 1000);
</script>

</body>
</html>
